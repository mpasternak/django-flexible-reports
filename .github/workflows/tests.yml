name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  POSTGRES_HOST: localhost

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        django-version: ["4.2", "5.0", "5.1"]

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install system dependencies
        run: sudo apt-get install -y gettext pandoc

      - name: Install dependencies
        run: |
          uv sync --all-extras
          uv pip install "Django>=${{ matrix.django-version }},<${{ matrix.django-version }}.99"

      - name: Run tests
        run: uv run pytest --cov=flexible_reports

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint with ruff
        run: uv run ruff check . || true

      - name: Check formatting with ruff
        run: uv run ruff format --check . || true
